<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Diagnóstico DHM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }

        .box {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .1);
        }

        h1 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        .item {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .ok {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #22c55e;
        }

        .err {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .inf {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .warn {
            background: #fef9c3;
            color: #854d0e;
            border-left: 4px solid #eab308;
        }

        pre {
            background: #1e1e1e;
            color: #00ff88;
            padding: 14px;
            border-radius: 8px;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 6px 4px;
        }

        .b-fix {
            background: #1e3a8a;
            color: #fff;
        }

        .b-del {
            background: #ef4444;
            color: #fff;
        }

        .b-auth {
            background: #22c55e;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>🔧 Diagnóstico DHM Distribuidora</h1>
        <div id="resultado"></div>
        <div id="acciones" style="margin-top:16px;"></div>
        <pre id="datos"></pre>
    </div>
    <script>
        const STORAGE_KEY = 'dhm_products';
        const AUTH_KEY = 'dhm_authenticated';
        const res = document.getElementById('resultado');
        const acc = document.getElementById('acciones');
        const datos = document.getElementById('datos');

        function add(msg, tipo) {
            const d = document.createElement('div');
            d.className = 'item ' + tipo;
            d.innerHTML = msg;
            res.appendChild(d);
        }

        // 1. localStorage disponible?
        try {
            localStorage.setItem('_test', '1');
            localStorage.removeItem('_test');
            add('✅ localStorage disponible', 'ok');
        } catch (e) {
            add('❌ localStorage NO disponible: ' + e.message, 'err');
        }

        // 2. Auth
        const auth = localStorage.getItem(AUTH_KEY);
        add(`🔐 Estado de autenticación: <strong>${auth === 'true' ? '✅ Autenticado' : '❌ NO autenticado (valor: ' + auth + ')'}</strong>`, auth === 'true' ? 'ok' : 'err');

        // 3. Productos
        let productos = [];
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
                add('⚠️ No hay productos en localStorage (vacío)', 'warn');
            } else {
                productos = JSON.parse(raw);
                add(`✅ Productos en localStorage: <strong>${productos.length}</strong>`, 'ok');

                // Mostrar muestra
                const muestra = productos.slice(0, 5).map(p =>
                    `[${p.code || '?'}] ${(p.name || '').substring(0, 40)} — $${p.price} — noStock:${p.noStock}`
                ).join('\n');
                datos.textContent = 'Primeros 5 productos:\n' + muestra +
                    '\n\nTamaño en localStorage: ' + Math.round(raw.length / 1024) + ' KB';

                // Verificar estructura
                const sinNombre = productos.filter(p => !p.name).length;
                if (sinNombre > 0) add(`⚠️ Productos sin nombre: ${sinNombre}`, 'warn');

                const sinId = productos.filter(p => !p.id).length;
                if (sinId > 0) add(`⚠️ Productos sin id: ${sinId}`, 'warn');

                add(`📊 Con precio: ${productos.filter(p => p.price > 0).length} | Sin stock: ${productos.filter(p => p.noStock).length}`, 'inf');
            }
        } catch (e) {
            add('❌ Error al parsear productos: ' + e.message, 'err');
            datos.textContent = 'Raw data: ' + localStorage.getItem(STORAGE_KEY)?.substring(0, 500);
        }

        // 4. Acciones
        acc.innerHTML = `
    <button class="b-auth" onclick="fixAuth()">🔑 Restaurar sesión admin</button>
    <button class="b-fix"  onclick="location.href='admin.html'">🔧 Ir al Panel Admin</button>
    <button class="b-fix"  onclick="location.href='catalogo.html'">📦 Ir al Catálogo</button>
    <button class="b-del"  onclick="limpiar()">🗑 Limpiar TODO el localStorage</button>
`;

        function fixAuth() {
            localStorage.setItem(AUTH_KEY, 'true');
            add('✅ Sesión restaurada. Ahora podés entrar al panel admin.', 'ok');
        }

        function limpiar() {
            if (!confirm('¿Borrar TODOS los datos? Esto elimina productos y sesión.')) return;
            localStorage.clear();
            add('🗑 localStorage limpiado. Recargá la página.', 'warn');
            setTimeout(() => location.reload(), 1500);
        }
    </script>
</body>

</html>
